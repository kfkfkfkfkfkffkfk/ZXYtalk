<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  :root {
    --blue: #0b84fe;
    --light-blue: #e8f3ff;
    --gray-bubble: #e9e9eb;
    --sidebar-bg: #f5f5f7;
    --sidebar-hover: #e5e5ea;
    --sidebar-active: #d1d1d6;
    --border: #d1d1d6;
    --text-primary: #000;
    --text-secondary: #8e8e93;
    --text-tertiary: #aeaeb2;
    --green: #34c759;
    --red: #ff3b30;
    --bg: #fff;
    --input-bg: #f2f2f7;
    --header-bg: rgba(255,255,255,0.85);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --sidebar-bg: #1c1c1e;
      --sidebar-hover: #2c2c2e;
      --sidebar-active: #3a3a3c;
      --border: #38383a;
      --text-primary: #fff;
      --text-secondary: #aeaeb2;
      --text-tertiary: #636366;
      --gray-bubble: #3a3a3c;
      --bg: #000;
      --input-bg: #1c1c1e;
      --header-bg: rgba(0,0,0,0.85);
      --light-blue: #0a2d5a;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 310px;
    min-width: 310px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #sidebar-header {
    padding: 16px 16px 8px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  #sidebar-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  #sidebar-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--sidebar-hover);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue);
    font-size: 16px;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--sidebar-active); }

  #search-box {
    width: 100%;
    height: 34px;
    background: var(--sidebar-active);
    border: none;
    border-radius: 10px;
    padding: 0 12px 0 32px;
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
    position: relative;
  }
  #search-wrap {
    position: relative;
  }
  #search-wrap svg {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    pointer-events: none;
  }

  #conversations {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  #conversations::-webkit-scrollbar { width: 0; }

  .convo-item {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    cursor: pointer;
    gap: 12px;
    position: relative;
    transition: background 0.1s;
    border-radius: 12px;
    margin: 1px 8px;
  }
  .convo-item:hover { background: var(--sidebar-hover); }
  .convo-item.active { background: var(--sidebar-active); }

  .avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    flex-shrink: 0;
    color: #fff;
    background: linear-gradient(135deg, #5e5ce6 0%, #0b84fe 100%);
    position: relative;
  }
  .avatar.online::after {
    content: '';
    width: 13px;
    height: 13px;
    background: var(--green);
    border-radius: 50%;
    position: absolute;
    bottom: 1px;
    right: 1px;
    border: 2px solid var(--sidebar-bg);
  }

  .convo-info { flex: 1; min-width: 0; }
  .convo-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2px;
  }
  .convo-name {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .convo-time {
    font-size: 12px;
    color: var(--text-secondary);
    flex-shrink: 0;
    margin-left: 8px;
  }
  .convo-preview {
    font-size: 14px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .convo-preview.unread { color: var(--text-primary); font-weight: 500; }
  .unread-dot {
    width: 10px;
    height: 10px;
    background: var(--blue);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── MAIN CHAT AREA ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--bg);
  }

  #chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: var(--header-bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  #chat-header-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    gap: 3px;
  }

  #chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #5e5ce6 0%, #0b84fe 100%);
    margin-bottom: 2px;
  }

  #chat-name {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  #chat-status {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .date-divider {
    text-align: center;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    margin: 12px 0 8px;
    letter-spacing: 0.2px;
  }

  .msg-row {
    display: flex;
    padding: 2px 16px;
    align-items: flex-end;
    gap: 8px;
  }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar-space {
    width: 28px;
    flex-shrink: 0;
  }
  .msg-mini-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5e5ce6 0%, #0b84fe 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .bubble-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 68%;
  }
  .msg-row.me .bubble-wrap { align-items: flex-end; }
  .msg-row.them .bubble-wrap { align-items: flex-start; }

  .bubble {
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 16px;
    line-height: 1.4;
    word-break: break-word;
    position: relative;
  }

  .bubble.me {
    background: var(--blue);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.them {
    background: var(--gray-bubble);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
  }

  /* Tails */
  .msg-row.me .bubble-wrap .bubble:last-child { border-bottom-right-radius: 4px; }
  .msg-row.them .bubble-wrap .bubble:last-child { border-bottom-left-radius: 4px; }

  .bubble.consecutive-me { border-bottom-right-radius: 18px; }
  .bubble.consecutive-them { border-bottom-left-radius: 18px; }

  .bubble-time {
    font-size: 11px;
    color: var(--text-tertiary);
    margin: 1px 4px 4px;
  }

  /* Typing indicator */
  #typing-row {
    display: none;
    padding: 4px 16px;
    align-items: flex-end;
    gap: 8px;
  }
  #typing-row.visible { display: flex; }

  .typing-bubble {
    background: var(--gray-bubble);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── INPUT ── */
  #input-area {
    padding: 10px 12px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--header-bg);
    backdrop-filter: blur(20px);
  }

  #input-wrap {
    flex: 1;
    background: var(--input-bg);
    border-radius: 20px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 6px 6px 6px 14px;
    gap: 6px;
    transition: border-color 0.2s;
  }
  #input-wrap:focus-within { border-color: var(--blue); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-size: 16px;
    color: var(--text-primary);
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    font-family: inherit;
    padding: 3px 0;
  }
  #msg-input::placeholder { color: var(--text-tertiary); }

  #send-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, opacity 0.2s;
    flex-shrink: 0;
    opacity: 0.4;
    pointer-events: none;
  }
  #send-btn.active {
    opacity: 1;
    pointer-events: all;
  }
  #send-btn:active { transform: scale(0.88); }
  #send-btn svg { color: #fff; }

  .attach-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--sidebar-active);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .attach-btn:hover { background: var(--border); }

  /* ── API KEY MODAL ── */
  #api-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  #api-modal.hidden { display: none; }

  #api-box {
    background: var(--bg);
    border-radius: 18px;
    padding: 28px;
    width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  #api-box h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  #api-box p {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 18px;
    line-height: 1.5;
  }
  #api-box a { color: var(--blue); text-decoration: none; }
  #api-key-input {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
    font-family: 'SF Mono', monospace;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  #api-key-input:focus { border-color: var(--blue); }
  #api-key-input::placeholder { font-family: -apple-system, sans-serif; color: var(--text-tertiary); }

  #api-submit {
    width: 100%;
    height: 44px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #api-submit:hover { opacity: 0.9; }
  #api-err {
    font-size: 13px;
    color: var(--red);
    margin-top: 10px;
    text-align: center;
    min-height: 18px;
  }

  /* ── NEW CONVO MODAL ── */
  #new-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
    backdrop-filter: blur(6px);
  }
  #new-modal.hidden { display: none; }
  #new-box {
    background: var(--bg);
    border-radius: 18px;
    padding: 24px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  #new-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  #new-name {
    width: 100%;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
    margin-bottom: 12px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  #new-name:focus { border-color: var(--blue); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1;
    height: 40px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .modal-btn.cancel { background: var(--sidebar-active); color: var(--text-primary); }
  .modal-btn.confirm { background: var(--blue); color: #fff; }
  .modal-btn:hover { opacity: 0.85; }

  /* ── EMPTY STATE ── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-secondary);
  }
  #empty-state svg { opacity: 0.3; }
  #empty-state p { font-size: 18px; font-weight: 500; }
  #empty-state span { font-size: 14px; opacity: 0.7; }

  /* ── REACTIONS ── */
  .bubble:hover { cursor: pointer; }

  /* Animate new messages */
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .bubble { animation: popIn 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    #sidebar { display: none; }
    #main { flex: 1; }
  }

  /* iMessage blue gradient shimmer on send */
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
</style>
</head>
<body>

<!-- API Key Modal -->
<div id="api-modal">
  <div id="api-box">
    <h2>💬 Messages</h2>
    <p>Enter your Anthropic API key to start chatting. Your key is stored only in this browser session and never sent anywhere except Anthropic's API.<br><br>
    Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
    <input id="api-key-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
    <button id="api-submit">Start Messaging</button>
    <div id="api-err"></div>
  </div>
</div>

<!-- New Conversation Modal -->
<div id="new-modal" class="hidden">
  <div id="new-box">
    <h2>New Message</h2>
    <input id="new-name" type="text" placeholder="Contact name (e.g. Mom, Alex, Aria)" maxlength="30">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeNewModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="createConvo()">Create</button>
    </div>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-title-row">
      <span id="sidebar-title">Messages</span>
      <button class="icon-btn" onclick="openNewModal()" title="New Message">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
    <div id="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-box" type="search" placeholder="Search" oninput="filterConvos(this.value)">
    </div>
  </div>
  <div id="conversations"></div>
</div>

<!-- Main -->
<div id="main">
  <div id="empty-state">
    <svg width="64" height="64" fill="none" viewBox="0 0 64 64">
      <path d="M32 6C17.6 6 6 16.7 6 30c0 5.8 2.2 11.1 5.9 15.2L9 54l9.3-2.8C21.8 52.3 26.8 54 32 54c14.4 0 26-10.7 26-24S46.4 6 32 6z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>
    <p>No conversation selected</p>
    <span>Choose a conversation or start a new one</span>
  </div>
</div>

<script>
// ── STATE ──
let apiKey = '';
let conversations = {};
let activeConvoId = null;
let myName = 'You';

const gradients = [
  'linear-gradient(135deg, #5e5ce6 0%, #0b84fe 100%)',
  'linear-gradient(135deg, #ff6b6b 0%, #ff9500 100%)',
  'linear-gradient(135deg, #30d158 0%, #34c759 100%)',
  'linear-gradient(135deg, #ff375f 0%, #ff2d55 100%)',
  'linear-gradient(135deg, #5ac8fa 0%, #007aff 100%)',
  'linear-gradient(135deg, #af52de 0%, #5e5ce6 100%)',
  'linear-gradient(135deg, #ff9f0a 0%, #ff6b00 100%)',
];

function getGradient(id) {
  return gradients[id % gradients.length];
}

function getInitial(name) {
  return name.trim().charAt(0).toUpperCase();
}

function timeStr(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm';
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
  }
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  if (diff < 7*86400000) return days[d.getDay()];
  return d.toLocaleDateString([], {month:'numeric',day:'numeric'});
}

function fullTime(ts) {
  return new Date(ts).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}

// ── API KEY ──
document.getElementById('api-submit').onclick = () => {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) {
    document.getElementById('api-err').textContent = 'That doesn\'t look like an Anthropic API key.';
    return;
  }
  apiKey = val;
  document.getElementById('api-modal').classList.add('hidden');
  initDefaultConvos();
};
document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('api-submit').click();
});

function initDefaultConvos() {
  addConvo('Aria', true);
  addConvo('Marcus', false);
  renderSidebar();
  openConvo(Object.keys(conversations)[0]);
}

// ── CONVERSATIONS ──
let convoCounter = 0;

function addConvo(name, online = false) {
  const id = convoCounter++;
  conversations[id] = {
    id,
    name,
    online,
    gradient: getGradient(id),
    messages: [],
    systemPrompt: `You are ${name}, a real human friend texting on iPhone. 
Reply naturally like a casual text message — short sentences, lowercase usually, abbreviations, occasional typos, emojis sometimes but not every message. 
Never say you're an AI. Respond in 1-3 short messages max. Be warm, real, and conversational.
Personality: ${name === 'Aria' ? 'witty and sarcastic but caring' : name === 'Marcus' ? 'chill, sporty, uses "bro" sometimes' : 'friendly and curious'}.`
  };
  return id;
}

function openNewModal() {
  document.getElementById('new-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('new-name').focus(), 50);
}
function closeNewModal() {
  document.getElementById('new-modal').classList.add('hidden');
  document.getElementById('new-name').value = '';
}
function createConvo() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return;
  const id = addConvo(name, Math.random() > 0.5);
  renderSidebar();
  openConvo(id);
  closeNewModal();
}
document.getElementById('new-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createConvo();
  if (e.key === 'Escape') closeNewModal();
});

function openConvo(id) {
  activeConvoId = id;
  document.querySelectorAll('.convo-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.convo-item[data-id="${id}"]`);
  if (item) item.classList.add('active');
  renderChat();
}

function renderSidebar() {
  const container = document.getElementById('conversations');
  container.innerHTML = '';
  Object.values(conversations).reverse().forEach(c => {
    const last = c.messages[c.messages.length - 1];
    const el = document.createElement('div');
    el.className = 'convo-item' + (c.id == activeConvoId ? ' active' : '');
    el.dataset.id = c.id;
    el.onclick = () => openConvo(c.id);
    el.innerHTML = `
      <div class="avatar ${c.online ? 'online' : ''}" style="background:${c.gradient}">${getInitial(c.name)}</div>
      <div class="convo-info">
        <div class="convo-top">
          <span class="convo-name">${escHtml(c.name)}</span>
          <span class="convo-time">${last ? timeStr(last.ts) : ''}</span>
        </div>
        <div class="convo-preview ${last && !last.read && last.role === 'them' ? 'unread' : ''}">
          ${last ? (last.role === 'me' ? 'You: ' : '') + escHtml(last.content.substring(0, 60)) : 'Tap to start chatting'}
        </div>
      </div>
    `;
    container.appendChild(el);
  });
}

function filterConvos(q) {
  document.querySelectorAll('.convo-item').forEach(el => {
    const id = el.dataset.id;
    const c = conversations[id];
    el.style.display = c.name.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

// ── CHAT RENDER ──
function renderChat() {
  const c = conversations[activeConvoId];
  const main = document.getElementById('main');

  main.innerHTML = `
    <div id="chat-header">
      <button class="icon-btn" style="visibility:hidden" title="">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div id="chat-header-info">
        <div id="chat-avatar" style="background:${c.gradient}">${getInitial(c.name)}</div>
        <div id="chat-name">${escHtml(c.name)}</div>
        <div id="chat-status">${c.online ? 'Active Now' : 'iMessage'}</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Video">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.361a1 1 0 0 1-1.447.894L15 14M3 8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </button>
        <button class="icon-btn" title="Info">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
      </div>
    </div>
    <div id="messages"></div>
    <div id="typing-row">
      <div class="msg-mini-avatar" style="background:${c.gradient}">${getInitial(c.name)}</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <div id="input-area">
      <button class="attach-btn" title="Apps">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>
      <div id="input-wrap">
        <textarea id="msg-input" placeholder="iMessage" rows="1"></textarea>
        <button id="send-btn" title="Send">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
    </div>
  `;

  renderMessages();
  setupInput();
  scrollBottom();
}

function renderMessages() {
  const c = conversations[activeConvoId];
  const container = document.getElementById('messages');
  container.innerHTML = '';

  if (c.messages.length === 0) {
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.textContent = 'Today';
    container.appendChild(div);
    return;
  }

  let lastDay = '';
  c.messages.forEach((msg, i) => {
    const day = new Date(msg.ts).toDateString();
    if (day !== lastDay) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = day === new Date().toDateString() ? 'Today' : new Date(msg.ts).toLocaleDateString([], {weekday:'long',month:'long',day:'numeric'});
      container.appendChild(div);
      lastDay = day;
    }

    const prev = c.messages[i - 1];
    const next = c.messages[i + 1];
    const sameAsPrev = prev && prev.role === msg.role;
    const sameAsNext = next && next.role === msg.role;

    const row = document.createElement('div');
    row.className = `msg-row ${msg.role}`;
    row.style.marginTop = sameAsPrev ? '1px' : '8px';

    const showAvatar = msg.role === 'them' && !sameAsNext;

    row.innerHTML = `
      ${msg.role === 'them' ? `<div class="msg-avatar-space">${showAvatar ? `<div class="msg-mini-avatar" style="background:${c.gradient}">${getInitial(c.name)}</div>` : ''}</div>` : ''}
      <div class="bubble-wrap">
        <div class="bubble ${msg.role} ${sameAsPrev ? (msg.role === 'me' ? 'consecutive-me' : 'consecutive-them') : ''}">${escHtml(msg.content).replace(/\n/g,'<br>')}</div>
        ${!sameAsNext ? `<div class="bubble-time">${msg.role === 'me' ? 'Delivered · ' : ''}${fullTime(msg.ts)}</div>` : ''}
      </div>
    `;

    container.appendChild(row);
  });
}

function scrollBottom() {
  const m = document.getElementById('messages');
  if (m) m.scrollTop = m.scrollHeight;
}

// ── INPUT ──
function setupInput() {
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  if (!input || !btn) return;

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    btn.classList.toggle('active', input.value.trim().length > 0);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (input.value.trim()) sendMessage();
    }
  });

  btn.onclick = sendMessage;
  setTimeout(() => input.focus(), 50);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeConvoId) return;

  const c = conversations[activeConvoId];
  c.messages.push({ role: 'me', content: text, ts: Date.now() });

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').classList.remove('active');

  renderMessages();
  renderSidebar();
  scrollBottom();

  // Show typing
  const typingRow = document.getElementById('typing-row');
  if (typingRow) {
    typingRow.classList.add('visible');
    scrollBottom();
  }

  try {
    const reply = await callClaude(c);
    if (typingRow) typingRow.classList.remove('visible');

    c.messages.push({ role: 'them', content: reply, ts: Date.now(), read: false });
    renderMessages();
    renderSidebar();
    scrollBottom();
  } catch (err) {
    if (typingRow) typingRow.classList.remove('visible');
    const errMsg = err.message || 'Failed to send. Check your API key.';
    c.messages.push({ role: 'them', content: '⚠️ ' + errMsg, ts: Date.now() });
    renderMessages();
    scrollBottom();
  }
}

async function callClaude(c) {
  const history = c.messages.slice(-20).map(m => ({
    role: m.role === 'me' ? 'user' : 'assistant',
    content: m.content
  }));

  // Ensure alternating turns (Claude API requirement)
  const filtered = [];
  for (let i = 0; i < history.length; i++) {
    if (i === 0 || history[i].role !== history[i-1].role) {
      filtered.push(history[i]);
    }
  }

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: c.systemPrompt,
      messages: filtered
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }

  const data = await resp.json();
  return data.content[0].text;
}

// ── UTILS ──
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close new modal on backdrop click
document.getElementById('new-modal').onclick = function(e) {
  if (e.target === this) closeNewModal();
};
</script>
